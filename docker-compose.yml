version: '3.9'

services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bookforbook
      POSTGRES_USER: bookforbook
      POSTGRES_PASSWORD: bookforbook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookforbook"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  celery:
    build: .
    command: celery -A config worker -l info
    depends_on:
      - db
      - redis
      - web
    env_file:
      - .env
    volumes:
      - .:/app

  celery-beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
      - web
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  postgres_data:
