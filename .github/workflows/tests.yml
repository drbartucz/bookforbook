name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
    env:
      FIELD_ENCRYPTION_KEY: ZmFrZS1mZXJuZXQta2V5LXRlc3QtZm9yLWRldg==
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        run: pytest --cov=apps --cov-report=term-missing --cov-report=xml

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=dev

      - name: Verify Vitest binary exists
        run: |
          node -p "require('./node_modules/vitest/package.json').version"
          test -f ./node_modules/vitest/dist/cli.js

      - name: Run frontend tests with coverage
        run: npm run test:coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20

    env:
      DJANGO_SETTINGS_MODULE: config.settings.e2e
      DATABASE_URL: sqlite:///db_e2e.sqlite3
      SECRET_KEY: e2e-ci-secret-key-not-for-production
      DEBUG: "True"
      FIELD_ENCRYPTION_KEY: ZmFrZS1mZXJuZXQta2V5LXRlc3QtZm9yLWRldg==

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Python / Django ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django migrations
        run: python manage.py migrate --run-syncdb

      - name: Seed E2E test data
        run: python manage.py seed_e2e --reset

      - name: Start Django dev server
        run: |
          python manage.py runserver 8000 &
          echo "Waiting for Django..."
          until curl -sf http://localhost:8000/api/v1/health/ 2>/dev/null || \
                curl -sf http://localhost:8000/ 2>/dev/null; do
            sleep 1
          done
          echo "Django ready."

      # ── Node / Frontend ─────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --include=dev

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1

      - name: Start Vite preview server
        working-directory: frontend
        run: |
          npm run preview -- --port 5173 &
          echo "Waiting for Vite..."
          until curl -sf http://localhost:5173/ 2>/dev/null; do sleep 1; done
          echo "Vite ready."

      # ── Playwright ───────────────────────────────────────────────────────
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run critical E2E tests
        working-directory: frontend
        run: npm run e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          DJANGO_BASE_URL: http://localhost:8000

      # ── Artifacts ───────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
